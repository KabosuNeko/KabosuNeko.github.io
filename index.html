                </svg>
                <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" id="pauseIcon" style="display: none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <button class="control-btn" onclick="nextSong()" title="Next">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="corner-character nadeshiko" onclick="toggleMusicPlayer()" tabindex="0" role="button" aria-label="Music player" data-tooltip="🎵 Music Player">
        <img src="assets/img/nadeshiko.png" alt="Nadeshiko - music player">
    </div>
    <div class="corner-character rin" onclick="openGallery()" tabindex="0" role="button" aria-label="Photo gallery" data-tooltip="📷 Open gallery">
        <img src="assets/img/rin.png" alt="Rin - click to open gallery">
    </div>

    <audio id="musicPlayer" preload="metadata"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/bs-init.js"></script>
    <script>
        function copyEmail(e) {
            e.preventDefault();
            navigator.clipboard.writeText('KabosuNeko@proton.me').then(function() {
                var toast = document.getElementById('copyToast');
                toast.textContent = '🏕️ copied to clipboard';
                toast.style.display = 'block';
                setTimeout(function() {
                    toast.style.display = 'none';
                }, 2000);
            });
        }

        var musicFiles = [
            "Fuyubiyori - Yuru Camp ED.mp3",
            "Kiminone - Laid Back Journey ｜ ＂Laid-Back Camp Season 3＂ Opening Theme.mp3",
            "Seize The Day [Yuru CampΔ OP SS2].mp3",
            "TVアニメ『ゆるキャン△ SEASON３』オープニング映像.mp3",
            "TVアニメ『ゆるキャン△ SEASON３』ノンクレジットエンディング映像.mp3",
            "Yuru Camp (Laid-Back Camp) Movie OP FULL『Sun Is Coming Up』.mp3",
            "Yuru Camp△ Movie Ending Full - Mimosa by Asaka.mp3",
            "Yuru Camp Season 2 ED • 佐々木恵梨 Eri Sasaki - Haru no Tonari はるのとなり.mp3",
            "[ Yuru Camp△⧸ゆるキャン△ ]Op - Shiny Days.mp3",
            "亜咲花「So Precious」Music Video Full ver. (TVアニメ『ゆるキャン△ SEASON３』エンディングテーマ).mp3",
            "【特別公開】『ゆるキャン△ SEASON２』ノンクレジットOP／亜咲花『Seize The Day』.mp3"
        ];

        var currentSongIndex = -1;
        var isPlayerOpen = false;
        var audio = document.getElementById('musicPlayer');
        var playerPopup = document.getElementById('musicPlayerPopup');
        var songNameEl = document.getElementById('currentSongName');
        var playIcon = document.getElementById('playIcon');
        var pauseIcon = document.getElementById('pauseIcon');
        var progressFill = document.getElementById('progressFill');
        var timeEl = document.getElementById('currentTime');
        var durationEl = document.getElementById('duration');

        function toggleMusicPlayer() {
            if (isPlayerOpen) {
                playerPopup.style.display = 'none';
                isPlayerOpen = false;
            } else {
                if (musicFiles.length === 0) {
                    showToast('Add music files to assets/musics/ folder!');
                    return;
                }
                playerPopup.style.display = 'block';
                isPlayerOpen = true;
                if (audio.paused && currentSongIndex === -1) {
                    playRandomSong();
                }
            }
        }

        function closeMusicPlayer() {
            playerPopup.style.display = 'none';
            isPlayerOpen = false;
        }

        function playRandomSong() {
            currentSongIndex = Math.floor(Math.random() * musicFiles.length);
            loadAndPlay(currentSongIndex);
        }

        function loadAndPlay(index) {
            currentSongIndex = index;
            var filename = musicFiles[index];
            audio.src = 'assets/musics/' + filename;
            songNameEl.textContent = cleanSongName(filename);
            audio.play().then(function() {
                updatePlayButton(true);
            });
        }

        function togglePlay() {
            if (audio.paused) {
                if (currentSongIndex === -1) {
                    playRandomSong();
                } else {
                    audio.play();
                    updatePlayButton(true);
                }
            } else {
                audio.pause();
                updatePlayButton(false);
            }
        }

        function nextSong() {
            if (musicFiles.length === 0) return;
            currentSongIndex = (currentSongIndex + 1) % musicFiles.length;
            loadAndPlay(currentSongIndex);
        }

        function previousSong() {
            if (musicFiles.length === 0) return;
            currentSongIndex = (currentSongIndex - 1 + musicFiles.length) % musicFiles.length;
            loadAndPlay(currentSongIndex);
        }

        function updatePlayButton(playing) {
            playIcon.style.display = playing ? 'none' : 'block';
            pauseIcon.style.display = playing ? 'block' : 'none';
        }

        function cleanSongName(filename) {
            var name = filename.replace(/\.mp3$/i, '');
            return name.length > 35 ? name.substring(0, 32) + '...' : name;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        function showToast(msg) {
            var toast = document.getElementById('copyToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(function() {
                toast.style.display = 'none';
                toast.textContent = 'copied to clipboard';
            }, 3000);
        }

        audio.addEventListener('timeupdate', function() {
            var progress = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = progress + '%';
            timeEl.textContent = formatTime(audio.currentTime);
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', nextSong);

        audio.addEventListener('loadedmetadata', function() {
            durationEl.textContent = formatTime(audio.duration);
        });

        document.querySelector('.progress-bar').addEventListener('click', function(e) {
            var rect = this.getBoundingClientRect();
            var pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        function openGallery() {
            window.location.href = 'gallery.html';
        }

        var themeMode = localStorage.getItem('theme') || 'auto';

        function getAutoTheme() {
            var hour = new Date().getHours();
            return (hour < 6 || hour >= 18) ? 'night' : 'day';
        }

        function applyTheme() {
            var theme = themeMode === 'auto' ? getAutoTheme() : themeMode;
            document.documentElement.setAttribute('data-theme', theme);
            var btn = document.getElementById('themeToggle');
            if (btn) {
                btn.textContent = themeMode === 'auto' ? 'A' : (themeMode === 'day' ? '☀' : '☾');
            }
        }

        function toggleTheme() {
            themeMode = themeMode === 'auto' ? 'day' : (themeMode === 'day' ? 'night' : 'auto');
            localStorage.setItem('theme', themeMode);
            applyTheme();
        }

        function updateClock() {
            var now = new Date();
            var h = now.getHours();
            var m = now.getMinutes();
            document.getElementById('clock').textContent = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
        }

        document.addEventListener('DOMContentLoaded', function() {
            applyTheme();
            updateClock();
            setInterval(updateClock, 1000);
            if (themeMode === 'auto') {
                setInterval(applyTheme, 60000);
            }
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            document.querySelector('.nadeshiko').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleMusicPlayer();
                }
            });
            document.querySelector('.rin').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openGallery();
                }
            });
        });
    </script>
</body>
</html>
